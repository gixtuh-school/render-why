    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Roboto, 'sans-serif';
        }
        
        #desktop {
            display: flex;
            flex-direction: row;   /* horizontal */
            flex-wrap: wrap;       /* allows wrapping to next line */
            align-content: flex-start; /* keeps them at the top */
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 40px;
            
            background-image: url("https://wallpaperaccess.com/full/1682023.jpg");
            background-size: cover;
            /* or 100% 100% if you want stretch */
            background-position: center;
            background-repeat: no-repeat;
        }
        
        
        /* Taskbar */
        #taskbar {
            z-index: 10000;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            color: white;
        }
        
        /* Desktop icon */
        .icon {
            width: 80px;
            text-align: center;
            color: white;
            cursor: pointer;
            margin: 20px;
            text-shadow: 0 0 6px black;
        }
        
        /* Window */
        .window {
            z-index: 99;
            position: absolute;
            width: 900px;
            height: 600px;
            top: 100px;
            left: 120px;
            background: #2b2b2b;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            display: none;
            flex-direction: column;
            overflow: hidden;
            resize: both;
            
            transform: scale(0.9);
            opacity: 0;
            transition:
            transform 0.18s ease,
            opacity 0.18s ease,
            top 0.18s ease-out,
            left 0.18s ease-out,
            width 0.18s ease-out,
            height 0.18s ease-out,
            border-radius 0.18s ease;
        }
        
        .window.open {
            transform: scale(1);
            opacity: 1;
        }
        
        .window.closing {
            transform: scale(0.9);
            opacity: 0;
        }
        
        .window.dragging iframe,
        .window.resizing iframe {
            pointer-events: none;
        }
        
        .taskbar-btn {
            z-index: 101;
            cursor: pointer;
            padding: 4px 10px;
            background: #222;
            border-radius: 6px;
            user-select: none;
            
            /* NEW: initial state (below taskbar) */
            transform: translateY(100%);
            opacity: 0;
            
            transition:
            transform 0.4s ease,
            opacity 0.4s ease;
        }
        
        /* When appearing */
        .taskbar-btn.show {
            transform: translateY(0%);
            opacity: 1;
        }
        
        /* When closing (falling down) */
        .taskbar-btn.fall {
            transform: translateY(200%);
            opacity: 0;
            transition:
            transform 0.6s ease-in
            opacity 0.6s ease-in;
        }
        
        /* Titlebar */
        .titlebar {
            height: 40px;
            background: #3a3a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            cursor: grab;
            color: white;
        }
        
        .titlebar span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
            outline: none;
        }
        
        
        /* Buttons */
        .buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .btn-close {
            background: #ff5f56;
        }
        
        .btn-min {
            background: #ffbd2e;
        }
        
        .btn-max {
            background: #27c93f;
        }
        
        /* Tabs */
        /* Tabs */
        .tabs {
            display: flex;
            align-items: flex-end;
            background: #242424;
            overflow: hidden;
            position: relative;
            contain: layout;
            /* helps prevent weird layout recalcs */
        }
        
        
        /* Individual tab */
        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            /* gives breathing room */
            
            padding: 8px 14px;
            /* slightly more horizontal padding */
            
            color: white;
            cursor: pointer;
            background: #2f2f2f;
            margin-right: 2px;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            
            transform: translateY(100%) scale(0.95);
            opacity: 0;
            
            transition:
            transform 0.25s cubic-bezier(.2, .8, .2, 1),
            opacity 0.2s ease;
        }
        
        /* When visible */
        .tab.show {
            transform: translateY(0%) scale(1);
            opacity: 1;
        }
        
        .tab-close {
            margin-left: auto;
            /* pushes it to the far right */
            opacity: 0.6;
            transition: opacity 0.15s ease;
        }
        
        .tab-close:hover {
            opacity: 1;
        }
        
        
        /* Removing animation */
        .tab.removing {
            transform: scale(0.9);
            opacity: 0;
        }
        
        /* Active */
        .tab.active {
            background: #444;
        }
        
        /* + button */
        .add-tab {
            padding: 8px 12px;
            cursor: pointer;
            color: white;
            transition: transform 0.25s cubic-bezier(.2, .8, .2, 1);
        }
        
        
        .content {
            flex: 1;
            background: #1f1f1f;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

            background: black;

                    taskBtn.classList.add("show");
                });
                
                taskBtn.onclick = () => { win.style.display = "flex"; bringToFront(win); };
                
                // === Window mechanics ===
                let isMaximized = false, prevState = {};
                let isDragging = false, isResizing = false, offsetX, offsetY;
                
                function bringToFront(w) {
                    document.querySelectorAll(".window").forEach(x => x.style.zIndex = 1);
                    w.style.zIndex = 999;
                }
                bringToFront(win);
                
                // --- global helper to toggle all iframes ---
                function setAllIframesInteraction(enabled) {
                    document.querySelectorAll("iframe").forEach(f => f.style.pointerEvents = enabled ? "auto" : "none");
                }
                
                // --- Dragging ---
                titlebar.addEventListener("mousedown", e => {
                    if (isMaximized) return;
                    isDragging = true;
                    offsetX = e.clientX - win.offsetLeft;
                    offsetY = e.clientY - win.offsetTop;
                    bringToFront(win);
                    setAllIframesInteraction(false);
                    e.preventDefault();
                });
                
                // --- Resizing ---
                win.addEventListener("mousedown", e => {
                    const rect = win.getBoundingClientRect();
                    if (rect.right - e.clientX < 10 || rect.bottom - e.clientY < 10) {
                        isResizing = true;
                        setAllIframesInteraction(false);
                        e.preventDefault();
                    }
                });
                
                // --- Mouse move ---
                document.addEventListener("mousemove", e => {
                    if (isDragging) {
                        win.style.left = (e.clientX - offsetX) + "px";
                        win.style.top = (e.clientY - offsetY) + "px";
                    }
                    if (isResizing) {
                        const rect = win.getBoundingClientRect();
                        win.style.width = Math.max(300, e.clientX - rect.left) + "px";
                        win.style.height = Math.max(200, e.clientY - rect.top) + "px";
                    }
                });
                
                // --- Mouse up ---
                document.addEventListener("mouseup", () => {
                    if (isDragging || isResizing) {
                        isDragging = false;
                        isResizing = false;
                        setAllIframesInteraction(true); // restore iframe interaction for all windows
                    }
                });

                    }, 400); // match fall animation duration

                };
                minBtn.onclick = () => win.style.display = "none";
                maxBtn.onclick = () => {
                    if (!isMaximized) {
                        prevState = { top: win.style.top, left: win.style.left, width: win.style.width, height: win.style.height, borderRadius: win.style.borderRadius };
                        win.style.top = "0px"; win.style.left = "0px"; win.style.width = "100%"; win.style.height = "100%";
                        win.style.borderRadius = "0px"; win.style.resize = "none";
                        isMaximized = true;
                    } else {
                        win.style.top = prevState.top; win.style.left = prevState.left;
                        win.style.width = prevState.width; win.style.height = prevState.height;
                        win.style.borderRadius = prevState.borderRadius; win.style.resize = "both";
                        isMaximized = false;
                    }
                };
            }

                input.style.width = Math.max(span.offsetWidth, 50) + "px";
                
                span.replaceWith(input);
                input.focus();
                input.select();
                
                function save() {
                    const newVal = input.value.trim() || span.textContent;

                    newSpan.textContent = newVal;
                    newSpan.style.whiteSpace = "nowrap";

            });
        }
